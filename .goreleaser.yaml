version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/shellai
    binary: shellai
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "shellai_{{.Os}}_{{.Arch}}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: SachinVenugopalan30
    name: shell-ai
  draft: false
  prerelease: auto
